    let d = document.createElement("div");
    d.className = "build";

// =====================
// UI SYSTEM
// =====================
const catDiv = document.getElementById("categories");
const subDiv = document.getElementById("subcategories");
const partDiv = document.getElementById("parts");
const statsDiv = document.getElementById("stats");

let currentCat = null;
let currentSub = null;

function loadCats() {
  catDiv.innerHTML = "";

  Object.keys(data).forEach(cat => {
    let el = document.createElement("div");
    el.className = "item";
    el.innerText = cat;
    el.onclick = () => loadSub(cat);
    catDiv.appendChild(el);
  });
}

function loadSub(cat) {
  currentCat = cat;
  subDiv.innerHTML = "";
  partDiv.innerHTML = "";

  Object.keys(data[cat]).forEach(sub => {
    let el = document.createElement("div");
    el.className = "item";
    el.innerText = sub;
    el.onclick = () => loadParts(cat, sub);
    subDiv.appendChild(el);
  });
}

function loadParts(cat, sub) {
  currentSub = sub;
  partDiv.innerHTML = "";

  data[cat][sub].forEach(p => {
    let el = document.createElement("div");
    el.className = "item";
    el.innerText = p.name;

    el.onclick = () => {
      setBuild(cat, p.name);
      statsDiv.innerHTML = "<h3>STATS</h3><div>" + p.stats + "</div>";
    };

    partDiv.appendChild(el);
  });
}
