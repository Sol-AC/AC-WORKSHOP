<style>
body { margin:0; font-family:Arial; background:#111; color:#fff; }

.container { display:flex; height:66vh; }
.panel { flex:1; border-right:1px solid #333; overflow:auto; padding:10px; }
.panel h2 { text-align:center; }

.item {
  background:#222;
  margin:4px 0;
  padding:6px;
  cursor:pointer;
}
.item:hover { background:#555; }

.bottom { height:34vh; display:flex; border-top:2px solid #333; }
.left,.right { flex:1; padding:10px; }

// assign to all 4 weapon categories
["Weapons R","Weapons L","Weapons R Bay","Weapons L Bay"].forEach(c=>{
  data[c]=weapons;
});

// ================= UI =================

let cat, sub;
let selected={};

function renderCats(){
 const el=document.getElementById("cat");
 el.innerHTML="<h2>Categories</h2>";
 Object.keys(data).forEach(c=>{
  const d=document.createElement("div");
  d.className="item";
  d.textContent=c;
  d.onclick=()=>{cat=c;renderSubs();};
  el.appendChild(d);
 });
}

function renderSubs(){
 const el=document.getElementById("sub");
 el.innerHTML="<h2>Subcategories</h2>";
 Object.keys(data[cat]).forEach(s=>{
  const d=document.createElement("div");
  d.className="item";
  d.textContent=s;
  d.onclick=()=>{sub=s;renderParts();};
  el.appendChild(d);
 });
}

function renderParts(){
 const el=document.getElementById("parts");
 el.innerHTML="<h2>Parts</h2>";
 data[cat][sub].forEach(p=>{
  const d=document.createElement("div");
  d.className="item";
  d.textContent=p.name;
  d.onclick=()=>{
   selected[cat]=p;
   showStats(p);
   update();
  };
  el.appendChild(d);
 });
}

function showStats(p){
 const el=document.getElementById("stats");
 el.innerHTML="<h2>Stats</h2>";
 Object.keys(p).forEach(k=>{
  if(k==="name") return;
  const d=document.createElement("div");
  d.textContent=k+": "+p[k];
  el.appendChild(d);
 });
}

function update(){
 let wp=0, lp=0;
 const el=document.getElementById("selected");
 el.innerHTML="";

 Object.keys(selected).forEach(c=>{
  const p=selected[c];
  const d=document.createElement("div");
  d.textContent=c+": "+p.name;
  el.appendChild(d);

  if(p.WP) wp+=p.WP;
  if(p.LP) lp+=p.LP;
 });

 const res=lp-wp;

 document.getElementById("wp").textContent=wp;
 document.getElementById("lp").textContent=lp;
 document.getElementById("res").textContent=res;
 document.getElementById("status").textContent =
  res<0 ? "Overweight" : "OK";
}

renderCats();

</script>

</body>
</html>
