<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AC Workshop</title>

<style>
body {
  margin: 0;
  background: #0a0f1c;
  color: #00d9ff;
  font-family: monospace;
  overflow: hidden;
}

h1 {
  padding: 8px;
  margin: 0;
}

.container {
  display: flex;
  height: 70vh;
}

.panel {
  flex: 1;
  border: 1px solid #00d9ff;
  padding: 8px;
  overflow-y: auto;
}

.item {
  padding: 4px;
  cursor: pointer;
}

.item:hover {
  color: white;
}

/* ===== BUILD BAR ===== */
.buildBar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 30vh;
  border-top: 2px solid #00ff99;
  background: #050914;
  padding: 10px;
  overflow-y: auto;
}

.buildItem {
  color: #00ff99;
  margin: 3px 0;
}
</style>
</head>

<body>

<h1>ASSEMBLY BAY</h1>

<div class="container">
  <div class="panel" id="categories"></div>
  <div class="panel" id="subcategories"></div>
  <div class="panel" id="parts"></div>
  <div class="panel" id="stats"></div>
</div>

<div class="buildBar" id="buildBar">
  <h3>BUILD LIST</h3>
  <div id="buildList"></div>
</div>

<script>

// =====================
// BUILD STATE
// =====================
const build = {};
let totalWP = 0;
let legLP = 0;

// =====================
// WP PARSER
// =====================
function getWP(text) {
  const m = text.match(/WP:\s*(\d+)/);
  return m ? parseInt(m[1]) : 0;
}

// =====================
// FIND ITEM
// =====================
function findItem(name) {
  for (let c in data) {
    for (let s in data[c]) {
      for (let i of data[c][s]) {
        if (i.name === name) return i;
      }
    }
  }
  return null;
}

// =====================
// SET BUILD
// =====================
function setBuild(cat, name) {
  build[cat] = name;
  recalc();
  render();
}

// =====================
// CALCULATION
// =====================
function recalc() {
  totalWP = 0;
  legLP = 0;

  for (let k in build) {
    let item = findItem(build[k]);
    if (!item) continue;

    totalWP += getWP(item.name);

    if (k === "LEGS") {
      legLP = getWP(item.name);
    }
  }
}

// =====================
// MAIN UI RENDER
// =====================
function render() {
  renderStats();
  renderBuild();
}

// =====================
// STATS PANEL
// =====================
function renderStats() {
  const stats = document.getElementById("stats");
  stats.innerHTML = "<h3>STATS</h3>";

  stats.innerHTML += "TOTAL WP: " + totalWP + "<br>";
  stats.innerHTML += "LEG LP: " + legLP + "<br>";

  let status = "";

  if (legLP === 0) status = "NO LEGS SELECTED";
  else if (totalWP > legLP) status = "OVERWEIGHT";
  else status = "OK";

  stats.innerHTML += "<br><b>" + status + "</b>";
}

// =====================
// BUILD BAR (NEW PANEL)
// =====================
function renderBuild() {
  const list = document.getElementById("buildList");
  list.innerHTML = "";

  for (let k in build) {
    let div = document.createElement("div");
    div.className = "buildItem";
    div.innerText = k + ": " + build[k];
    list.appendChild(div);
  }

  if (Object.keys(build).length === 0) {
    list.innerText = "No parts selected yet.";
  }
}

// =====================
// DATA (UNCHANGED STRUCTURE)
// =====================
const data = {

Heads: {
  "Heads": [
    { name: "-KE Head / WP:200", stats: "" },
    { name: "-CE Head / WP:225", stats: "" },
    { name: "-TE Head / WP:275", stats: "" }
  ]
},

Cores: {
  "KE Cores": [
    { name: "-Light KE Core / WP:575", stats: "Low armor" },
    { name: "-Middle KE Core / WP:725", stats: "Low-Mid armor" }
  ],
  "CE Cores": [
    { name: "-Middle CE Core / WP:850", stats: "Delay bonus" },
    { name: "-Heavy CE Core / WP:1000", stats: "Delay bonus +" }
  ],
  "TE Cores": [
    { name: "-Middle TE Core / WP:1150", stats: "Dome x1" },
    { name: "-Heavy TE Core / WP:1250", stats: "Dome x2" }
  ]
},

LEGS: {
  "Bipedal": [
    { name: "-Light Fast spec / WP:300", stats: "" },
    { name: "-Heavy Load spec / WP:700", stats: "" }
  ]
},

Weapons: {
  "KE": [
    { name: "-Handgun / WP:250", stats: "" },
    { name: "-Rifle / WP:525", stats: "" }
  ]
}

};

// =====================
// UI NAVIGATION
// =====================
const catDiv = document.getElementById("categories");
const subDiv = document.getElementById("subcategories");
const partDiv = document.getElementById("parts");

function loadCats() {
  catDiv.innerHTML = "";

  Object.keys(data).forEach(c => {
    let d = document.createElement("div");
    d.className = "item";
    d.innerText = c;
    d.onclick = () => loadSub(c);
    catDiv.appendChild(d);
  });
}

function loadSub(cat) {
  subDiv.innerHTML = "";
  partDiv.innerHTML = "";

  Object.keys(data[cat]).forEach(s => {
    let d = document.createElement("div");
    d.className = "item";
    d.innerText = s;
    d.onclick = () => loadParts(cat, s);
    subDiv.appendChild(d);
  });
}

function loadParts(cat, sub) {
  partDiv.innerHTML = "";

  data[cat][sub].forEach(p => {
    let d = document.createElement("div");
    d.className = "item";
    d.innerText = p.name;

    d.onclick = () => {
      setBuild(cat, p.name);
    };

    partDiv.appendChild(d);
  });
}

loadCats();
render();

</script>

</body>
</html>
