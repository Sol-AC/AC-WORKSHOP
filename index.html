<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AC Workshop</title>

  <style>
    body {
      margin: 0;
      background: #0a0f1c;
      color: #00d9ff;
      font-family: monospace;
    }

    h1 {
      padding: 10px;
    }

    .container {
      display: flex;
      height: 90vh;
    }

    .panel {
      flex: 1;
      border: 1px solid #00d9ff;
      padding: 10px;
      overflow-y: auto;
    }

    .item {
      padding: 5px;
      cursor: pointer;
    }

    .item:hover {
      color: white;
    }

    .build {
      color: #00ff99;
    }
  </style>
</head>

<body>

<h1>ASSEMBLY BAY</h1>

<div class="container">
  <div class="panel" id="categories"></div>
  <div class="panel" id="subcategories"></div>
  <div class="panel" id="parts"></div>
  <div class="panel" id="stats"></div>
</div>

<script>

// =====================
// BUILD STATE
// =====================
const build = {};

// =====================
// DATA (YOUR SYSTEM)
// =====================
const data = {

  Heads: {
    "Heads": [
      { name: "KE Head", stats: "WP:200" },
      { name: "CE Head", stats: "WP:225" },
      { name: "TE Head", stats: "WP:275" }
    ]
  },

  Cores: {
    "KE Cores": [
      { name: "Light KE Core", stats: "WP:575 | Low armor" },
      { name: "Middle KE Core", stats: "WP:725 | Low-Mid armor" }
    ],
    "CE Cores": [
      { name: "Middle CE Core", stats: "WP:850 | +15 delay" },
      { name: "Heavy CE Core", stats: "WP:1000 | +20 delay" }
    ],
    "TE Cores": [
      { name: "Middle TE Core", stats: "WP:1150 | Dome x1" },
      { name: "Heavy TE Core", stats: "WP:1250 | Dome x2" }
    ]
  },

  Arms: {
    "KE Arms": [
      { name: "KE Light Arms", stats: "WP:275" },
      { name: "KE Heavy Arms", stats: "WP:525" }
    ],
    "CE Arms": [
      { name: "CE Light Arms", stats: "WP:325" },
      { name: "CE Heavy Arms", stats: "WP:575" }
    ]
  },

  Legs: {
    "Bipedal": [
      { name: "Light Biped", stats: "Fast" },
      { name: "Heavy Biped", stats: "Load" }
    ]
  },

  FCS: {
    "Types": [
      { name: "High Speed", stats: "Vertical: 3" },
      { name: "Normal", stats: "Vertical: 2" },
      { name: "Low Speed", stats: "Vertical: 1" }
    ]
  },

  Boosters: {
    "Boosters": [
      { name: "Low Energy", stats: "" },
      { name: "High Power", stats: "" }
    ]
  },

  Weapons: {
    "KE": [
      { name: "Handgun", stats: "WP:250" },
      { name: "Rifle", stats: "WP:525" }
    ],
    "CE": [
      { name: "Shotgun", stats: "WP:450" },
      { name: "Sniper Rifle", stats: "WP:625" }
    ],
    "TE": [
      { name: "Pulse Gun", stats: "WP:250" },
      { name: "Laser Rifle", stats: "WP:600" }
    ]
  }

};

// =====================
// DOM ELEMENTS
// =====================
const catDiv = document.getElementById("categories");
const subDiv = document.getElementById("subcategories");
const partDiv = document.getElementById("parts");
const statsDiv = document.getElementById("stats");

// =====================
// BUILD DISPLAY
// =====================
function updateBuild() {
  statsDiv.innerHTML = "<h3>BUILD</h3>";

  for (let k in build) {
    let el = document.createElement("div");
    el.className = "build";
    el.innerText = k + ": " + build[k];
    statsDiv.appendChild(el);
  }
}

// =====================
// SELECT PART
// =====================
function select(category, name, side = null) {

  if (side === "L") build["Left Arm"] = name;
  else if (side === "R") build["Right Arm"] = name;
  else build[category] = name;

  updateBuild();
}

// =====================
// LOAD PARTS
// =====================
function loadParts(cat, sub, special = null) {

  partDiv.innerHTML = "";

  data[cat][sub].forEach(p => {

    let el = document.createElement("div");
    el.className = "item";
    el.innerText = p.name;

    el.onclick = () => {

      if (special === "L") select("Weapons", p.name, "L");
      else if (special === "R") select("Weapons", p.name, "R");
      else select(cat, p.name);

      statsDiv.innerHTML = "<h3>STATS</h3><div>" + p.stats + "</div>";
    };

    partDiv.appendChild(el);
  });
}

// =====================
// LOAD SUBCATEGORIES
// =====================
function loadSub(cat, special = null) {

  subDiv.innerHTML = "";
  partDiv.innerHTML = "";

  for (let sub in data[cat]) {

    let el = document.createElement("div");
    el.className = "item";
    el.innerText = sub;

    el.onclick = () => loadParts(cat, sub, special);

    subDiv.appendChild(el);
  }
}

// =====================
// LOAD CATEGORIES
// =====================
function loadCats() {

  catDiv.innerHTML = "";

  Object.keys(data).forEach(cat => {

    let el = document.createElement("div");
    el.className = "item";
    el.innerText = cat;

    el.onclick = () => loadSub(cat);

    catDiv.appendChild(el);
  });

  // Left / Right weapon entry points
  ["Left Arm Weapon", "Right Arm Weapon"].forEach(side => {

    let el = document.createElement("div");
    el.className = "item";
    el.innerText = side;

    el.onclick = () => {

      if (side.includes("Left")) loadSub("Weapons", "L");
      else loadSub("Weapons", "R");

    };

    catDiv.appendChild(el);
  });

}

// =====================
// INIT
// =====================
loadCats();
updateBuild();

</script>

</body>
</html>
