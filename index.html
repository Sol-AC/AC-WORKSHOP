<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC Builder</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
}

.container {
  display: flex;
  height: 66vh;
}

.panel {
  flex: 1;
  border-right: 1px solid #333;
  overflow-y: auto;
  padding: 10px;
}

.panel:last-child {
  border-right: none;
}

.item {
  padding: 6px;
  cursor: pointer;
  border-bottom: 1px solid #333;
}

.item:hover {
  background: #333;
}

.selected {
  background: #555;
}

.bottom {
  height: 34vh;
  display: flex;
  border-top: 2px solid #444;
}

.bottom-left {
  flex: 2;
  padding: 10px;
  overflow-y: auto;
}

.bottom-right {
  flex: 1;
  padding: 10px;
  border-left: 2px solid #444;
}

h3 {
  margin-top: 0;
}

</style>
</head>
<body>

<div class="container">
  <div class="panel" id="categories"></div>
  <div class="panel" id="subcategories"></div>
  <div class="panel" id="parts"></div>
  <div class="panel" id="stats"></div>
</div>

<div class="bottom">
  <div class="bottom-left" id="selected"></div>
  <div class="bottom-right">
    <h3>Totals</h3>
    <div>WP: <span id="wp">0</span></div>
    <div>LP: <span id="lp">0</span></div>
    <div>Result (LP - WP): <span id="result">0</span></div>
    <div id="status"></div>
  </div>
</div>

<script>

// ================= DATA =================

const data = {
  Heads: {
    "All": [
      {name:"KE Head", wp:200},
      {name:"CE Head", wp:225},
      {name:"TE Head", wp:275}
    ]
  },

  Cores: {
    "KE": [
      {name:"Light KE Core", wp:575, desc:"Low armor"},
      {name:"Middle KE Core", wp:725, desc:"Low-Mid armor"}
    ],
    "CE": [
      {name:"Middle CE Core", wp:850},
      {name:"Heavy CE Core", wp:1000}
    ],
    "TE": [
      {name:"Middle TE Core", wp:1150},
      {name:"Heavy TE Core", wp:1250}
    ]
  },

  Arms: {
    "Normal": [
      {name:"KE Light Arms", wp:275},
      {name:"KE Middle Arms", wp:450},
      {name:"KE Heavy Arms", wp:525},
      {name:"CE Light Arms", wp:325},
      {name:"CE Middle Arms", wp:475},
      {name:"CE Heavy Arms", wp:575},
      {name:"TE Middle Arms", wp:850},
      {name:"TE Heavy Arms", wp:1000}
    ],
    "Weapon": [
      {name:"Sniper Cannon Arms", wp:2000},
      {name:"Blade Arms", wp:2500},
      {name:"Scatter Cannon Arms", wp:2050},
      {name:"Cannon Arms", wp:2450},
      {name:"Laser Cannon Arms", wp:2500},
      {name:"Scatter Pulse Arms", wp:2300}
    ],
    "Experimental": [
      {name:"Shield Arms", wp:2200},
      {name:"Repeater Cannon Arms", wp:2150}
    ]
  },

  Legs: {
    "All": [
      {name:"Bipedal Light", lp:0},
      {name:"Bipedal Mid", lp:0},
      {name:"Bipedal Heavy", lp:0},
      {name:"Reverse Light", lp:0},
      {name:"Reverse Heavy", lp:0},
      {name:"Tetrapod", lp:0},
      {name:"Tank", lp:0}
    ]
  },

  FCS: {
    "All": [
      {name:"High speed", wp:0},
      {name:"Normal speed", wp:0},
      {name:"Low speed", wp:0}
    ]
  },

  Boosters: {
    "All": [
      {name:"Low energy", wp:0},
      {name:"High acceleration", wp:0},
      {name:"High power", wp:0},
      {name:"Balanced", wp:0}
    ]
  },

  Weapons: {
    "KE": [
      {name:"Handgun", wp:250},
      {name:"Rifle", wp:525},
      {name:"Gatling", wp:950}
    ],
    "CE": [
      {name:"Shotgun", wp:450},
      {name:"Sniper Rifle", wp:625}
    ],
    "TE": [
      {name:"Pulse Gun", wp:250},
      {name:"Plasma Gun", wp:875}
    ],
    "Melee": [
      {name:"Physical Blade", wp:150},
      {name:"Pile Driver", wp:225}
    ]
  },

  Shoulders: {
    "All": [
      {name:"Shield Dropper", wp:400},
      {name:"Mine Dropper", wp:325},
      {name:"Energy Amplifier", wp:650},
      {name:"Reserve Magazine", wp:650},
      {name:"Rockets", wp:600}
    ]
  }
};

// ================= STATE =================

let selectedCategory = null;
let selectedSub = null;

let selections = {};
let weapons = [];

// ================= UI =================

function renderCategories() {
  const el = document.getElementById("categories");
  el.innerHTML = "<h3>Categories</h3>";

  Object.keys(data).forEach(cat => {
    const div = document.createElement("div");
    div.className = "item";
    div.textContent = cat;

    div.onclick = () => {
      selectedCategory = cat;
      selectedSub = null;
      renderSubcategories();
      renderParts([]);
      renderStats(null);
    };

    el.appendChild(div);
  });
}

function renderSubcategories() {
  const el = document.getElementById("subcategories");
  el.innerHTML = "<h3>Subcategories</h3>";

  if (!selectedCategory) return;

  Object.keys(data[selectedCategory]).forEach(sub => {
    const div = document.createElement("div");
    div.className = "item";
    div.textContent = sub;

    div.onclick = () => {
      selectedSub = sub;
      renderParts(data[selectedCategory][sub]);
    };

    el.appendChild(div);
  });
}

function renderParts(parts) {
  const el = document.getElementById("parts");
  el.innerHTML = "<h3>Parts</h3>";

  parts.forEach(part => {
    const div = document.createElement("div");
    div.className = "item";
    div.textContent = part.name;

    div.onclick = () => {
      renderStats(part);
      selectPart(part);
    };

    el.appendChild(div);
  });
}

function renderStats(part) {
  const el = document.getElementById("stats");
  el.innerHTML = "<h3>Stats</h3>";

  if (!part) return;

  el.innerHTML += `<div>${part.name}</div>`;
  if (part.wp) el.innerHTML += `<div>WP: ${part.wp}</div>`;
  if (part.lp) el.innerHTML += `<div>LP: ${part.lp}</div>`;
}

// ================= SELECTION =================

function selectPart(part) {

  if (selectedCategory === "Weapons") {
    if (weapons.length >= 4) {
      alert("Max 4 weapons!");
      return;
    }
    weapons.push(part);
  } else {
    selections[selectedCategory] = part;
  }

  updateBottom();
}

// ================= CALCULATIONS =================

function updateBottom() {
  const el = document.getElementById("selected");
  el.innerHTML = "<h3>Selected Parts</h3>";

  let totalWP = 0;
  let totalLP = 0;

  for (let cat in selections) {
    let p = selections[cat];
    el.innerHTML += `<div>${cat}: ${p.name}</div>`;

    if (cat === "Legs") {
      totalLP += p.lp || 0;
    } else {
      totalWP += p.wp || 0;
    }
  }

  weapons.forEach((w, i) => {
    el.innerHTML += `<div>Weapon ${i+1}: ${w.name}</div>`;
    totalWP += w.wp;
  });

  document.getElementById("wp").textContent = totalWP;
  document.getElementById("lp").textContent = totalLP;

  let result = totalLP - totalWP;
  document.getElementById("result").textContent = result;

  let status = document.getElementById("status");

  if (result < 0) {
    status.textContent = "Overweight";
    status.style.color = "red";
  } else {
    status.textContent = "OK";
    status.style.color = "lightgreen";
  }
}

// ================= INIT =================

renderCategories();

</script>

</body>
</html>
